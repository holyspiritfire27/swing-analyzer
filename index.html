<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>前踢動作分析系統 (完美無黑屏版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
        }
        .camera-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            transform-origin: center center;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
        }
        /* 讓畫布填滿螢幕 */
        .output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .top-panel, .bottom-panel {
            pointer-events: auto; 
            background: rgba(0, 0, 0, 0.65);
            padding: 15px;
            text-align: center;
            color: white;
            width: 100%;
            box-sizing: border-box;
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            font-weight: bold;
            transition: background 0.2s;
        }
        button:active { background-color: #2980b9; transform: translateY(2px); }
        select {
            padding: 10px;
            font-size: 16px;
            background-color: #2c3e50;
            color: white;
            border: 2px solid #3498db;
            border-radius: 8px;
            outline: none;
            max-width: 80%;
            display: none; 
        }
        .zoom-container {
            margin: 10px auto 0;
            width: 80%;
            max-width: 300px;
            display: none; 
        }
        .zoom-container input[type=range] {
            width: 100%;
            margin-top: 5px;
        }
        #downloadBtn {
            background-color: #e67e22;
            display: none;
            margin: 10px auto 0 auto;
            width: fit-content;
        }
        .status-display {
            font-size: 18px;
            color: #2ecc71;
            font-weight: bold;
            margin-top: 5px;
            min-height: 24px;
        }
        .angle-info {
            font-size: 24px;
            font-weight: bold;
        }
        #currentAngle { color: white; }
        #maxAngle { color: #f1c40f; font-size: 32px; }
        #screenshotImg {
            max-width: 40%;
            max-height: 20vh;
            border: 2px solid #f1c40f;
            border-radius: 8px;
            display: none;
            position: absolute;
            bottom: 130px;
            right: 15px;
            z-index: 30;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            pointer-events: auto;
            -webkit-touch-callout: default; 
        }
        #debugLog { font-size: 12px; color: #e74c3c; margin-top: 5px; word-wrap: break-word; }
    </style>
</head>
<body>

    <div class="camera-container" id="cameraContainer">
        <video id="videoElement" playsinline autoplay muted style="position:absolute; width:1px; height:1px; left:-9999px;"></video>
        <canvas class="output_canvas"></canvas>
        <canvas id="buffer_canvas" style="display:none;"></canvas>
    </div>

    <div class="ui-layer">
        <div class="top-panel">
            <div class="controls">
                <button id="startBtn">啟動鏡頭</button>
                <select id="cameraSelect"></select>
            </div>
            <div class="zoom-container" id="zoomContainer">
                <label for="zoomSlider">🔍 調整畫面遠近：</label>
                <input type="range" id="zoomSlider" min="0.7" max="3" step="0.1" value="1">
            </div>
            <div class="status-display" id="statusText">等待啟動...</div>
            <div id="debugLog"></div>
        </div>
        <div class="bottom-panel">
            <div class="angle-info">目前角度: <span id="currentAngle">0</span>°</div>
            <div class="angle-info" id="finalAngleText">最高點角度: <span id="maxAngle">0</span>°</div>
            <button id="downloadBtn">⬇️ 儲存截圖</button>
        </div>
    </div>

    <img id="screenshotImg" alt="截圖">

    <script>
        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementsByClassName('output_canvas')[0];
        const canvasCtx = canvasElement.getContext('2d');
        const bufferCanvas = document.getElementById('buffer_canvas');
        const bufferCtx = bufferCanvas.getContext('2d');
        const cameraContainer = document.getElementById('cameraContainer');

        const currentAngleEl = document.getElementById('currentAngle');
        const statusTextEl = document.getElementById('statusText');
        const maxAngleEl = document.getElementById('maxAngle');
        const screenshotImg = document.getElementById('screenshotImg');
        const debugLog = document.getElementById('debugLog');
        
        const startBtn = document.getElementById('startBtn');
        const cameraSelect = document.getElementById('cameraSelect'); 
        const downloadBtn = document.getElementById('downloadBtn');
        const zoomContainer = document.getElementById('zoomContainer');
        const zoomSlider = document.getElementById('zoomSlider');

        let useFrontCamera = false; 
        let currentStream = null;
        let videoDevices = [];
        let currentDeviceIndex = 0;
        let currentZoomLevel = 1.0;

        let poseLoaded = false;
        let isProcessingFrame = false; 
        let isCameraSwitching = false; 
        let hasStartedLoop = false;    
        let lastTime = 0; 
        
        let isKicking = false;
        let currentMaxAngle = 0;
        let smoothedAngle = 0;       
        let dropFrameCount = 0;      
        
        const START_KICK_THRESHOLD = 40; 
        const END_KICK_DROP = 25;    
        const STABLE_FRAMES = 3;     

        function calculateAngle(hip1, ankle1, hip2, ankle2, canvasW, canvasH) {
            const dx1 = (ankle1.x - hip1.x) * canvasW;
            const dy1 = (ankle1.y - hip1.y) * canvasH;
            const dx2 = (ankle2.x - hip2.x) * canvasW;
            const dy2 = (ankle2.y - hip2.y) * canvasH;
            
            const dotProduct = dx1 * dx2 + dy1 * dy2;
            const mag1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
            const mag2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
            
            if (mag1 === 0 || mag2 === 0) return 0;
            return Math.acos(dotProduct / (mag1 * mag2)) * (180 / Math.PI);
        }

        // 🔥 終極截圖函數
        function captureMaxPointFrame(landmarks) {
            // 確保影像已載入且有尺寸
            if (videoElement.readyState < 2) return; 
            if (videoElement.videoWidth === 0 || videoElement.videoHeight === 0) return;

            // 🔥 Debug 驗證：顯示當前抓到的影像真實解析度
            debugLog.innerText = `截圖來源解析度: ${videoElement.videoWidth}x${videoElement.videoHeight}`;

            bufferCtx.save();
            bufferCtx.clearRect(0, 0, bufferCanvas.width, bufferCanvas.height);
            
            // 處理前鏡頭鏡像
            if (useFrontCamera) {
                bufferCtx.translate(bufferCanvas.width, 0);
                bufferCtx.scale(-1, 1);
            }
            
            // 同步直接畫，不拖延！保證抓到剛算完的那一幀
            bufferCtx.drawImage(videoElement, 0, 0, bufferCanvas.width, bufferCanvas.height);
            
            // 補上骨架
            if (landmarks) {
                drawConnectors(bufferCtx, landmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                drawLandmarks(bufferCtx, landmarks, {color: '#FF0000', lineWidth: 2});
            }
            
            bufferCtx.restore();
        }

        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }});
        pose.setOptions({
            modelComplexity: 1, 
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults(onResults);
        pose.initialize().then(() => {
            poseLoaded = true;
            if(statusTextEl.innerText === "等待啟動...") {
                statusTextEl.innerText = "模型就緒，請點擊啟動";
            }
        });

        function onResults(results) {
            if (isCameraSwitching) return;

            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            bufferCanvas.width = videoElement.videoWidth;
            bufferCanvas.height = videoElement.videoHeight;
            
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (useFrontCamera) {
                canvasCtx.translate(canvasElement.width, 0);
                canvasCtx.scale(-1, 1);
            }
            
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2});

                const landmarks = results.poseLandmarks;
                const leftHip = landmarks[23];
                const rightHip = landmarks[24];
                const leftAnkle = landmarks[27];
                const rightAnkle = landmarks[28];

                if (leftHip.visibility > 0.2 && rightHip.visibility > 0.2 && 
                    leftAnkle.visibility > 0.2 && rightAnkle.visibility > 0.2) {
                    
                    let rawAngle = calculateAngle(
                        leftHip, leftAnkle, rightHip, rightAnkle, 
                        canvasElement.width, canvasElement.height
                    );

                    if (smoothedAngle === 0) {
                        smoothedAngle = rawAngle; 
                    } else {
                        smoothedAngle = (rawAngle * 0.6) + (smoothedAngle * 0.4); 
                    }
                    
                    let angle = Math.round(smoothedAngle);
                    currentAngleEl.innerText = angle;
                    currentAngleEl.style.color = "white";

                    if (!isKicking && angle > START_KICK_THRESHOLD) {
                        isKicking = true;
                        currentMaxAngle = angle;
                        dropFrameCount = 0; 
                        
                        statusTextEl.innerText = "💥 偵測到踢擊，記錄中...";
                        statusTextEl.style.color = "#e74c3c"; 
                        downloadBtn.style.display = "none";
                        screenshotImg.style.display = "none";
                        
                        captureMaxPointFrame(landmarks); 

                    } else if (isKicking) {
                        if (angle > currentMaxAngle) {
                            currentMaxAngle = angle;
                            dropFrameCount = 0; 
                            
                            captureMaxPointFrame(landmarks); 
                            
                        } else if (angle < currentMaxAngle - END_KICK_DROP) {
                            dropFrameCount++;

                            if (dropFrameCount >= STABLE_FRAMES) {
                                isKicking = false;
                                statusTextEl.innerText = "✅ 完成！可進行下一次";
                                statusTextEl.style.color = "#2ecc71"; 
                                maxAngleEl.innerText = currentMaxAngle;
                                
                                // 使用 Blob 取代 DataURL，解決 FB/LINE 內建瀏覽器崩潰問題
                                bufferCanvas.toBlob((blob) => {
                                    if (!blob) return;
                                    const objectUrl = URL.createObjectURL(blob);
                                    
                                    screenshotImg.src = objectUrl;
                                    screenshotImg.style.display = "block";
                                    downloadBtn.style.display = "block"; 
                                    
                                    // 綁定下載功能
                                    downloadBtn.onclick = async () => {
                                        try {
                                            const file = new File([blob], `kick_${maxAngleEl.innerText}deg.jpg`, { type: 'image/jpeg' });
                                            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                                                await navigator.share({
                                                    files: [file],
                                                    title: '前踢最高點紀錄',
                                                    text: `最高點角度：${maxAngleEl.innerText} 度！`
                                                });
                                            } else {
                                                const link = document.createElement('a');
                                                link.download = `kick_${maxAngleEl.innerText}deg.jpg`;
                                                link.href = objectUrl;
                                                link.click();
                                            }
                                        } catch (e) {
                                            alert("請直接【長按】畫面右下角的截圖，選擇「儲存圖片」即可！");
                                        }
                                    };
                                }, 'image/jpeg', 0.9);
                                
                                currentMaxAngle = 0;
                                dropFrameCount = 0;
                                smoothedAngle = 0;
                            }
                        } else {
                            dropFrameCount = 0;
                        }
                    }
                } else {
                    currentAngleEl.style.color = "#95a5a6";
                }
            }
            canvasCtx.restore();
        }

        function stopMediaTracks(stream) {
            if (stream) stream.getTracks().forEach(track => track.stop());
        }

        function populateCameraList() {
            cameraSelect.innerHTML = "";
            videoDevices.forEach((device, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.text = device.label || `未命名鏡頭 ${index + 1}`;
                cameraSelect.appendChild(option);
            });
            cameraSelect.value = currentDeviceIndex;
            cameraSelect.style.display = "inline-block"; 
        }

        async function getCameras() {
            try {
                if (videoDevices.length === 0) {
                    const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    stopMediaTracks(tempStream);
                }
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                const preferred = videoDevices.findIndex(d => {
                    const label = d.label.toLowerCase();
                    return (label.includes('back') || label.includes('rear') || label.includes('environment')) &&
                           !label.includes('tele') && !label.includes('zoom') && 
                           !label.includes('ir ') && !label.includes('depth');
                });
                currentDeviceIndex = preferred !== -1 ? preferred : 0;
                populateCameraList();
            } catch (err) {
                console.error("獲取鏡頭列表失敗:", err);
            }
        }

        async function startCamera() {
            if (!poseLoaded) { alert("AI 模型尚未準備好，請稍等。"); return; }
            if (isCameraSwitching) return; 

            isCameraSwitching = true; 
            statusTextEl.innerText = "切換鏡頭中...";
            statusTextEl.style.color = "#f1c40f";

            while (isProcessingFrame) {
                await new Promise(r => setTimeout(r, 10));
            }
            
            if (currentStream) {
                stopMediaTracks(currentStream);
                videoElement.pause();
                videoElement.srcObject = null; 
                videoElement.load(); 
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                bufferCtx.clearRect(0, 0, bufferCanvas.width, bufferCanvas.height);
            }

            await new Promise(resolve => setTimeout(resolve, 300));

            const device = videoDevices[currentDeviceIndex];
            const deviceId = device ? { exact: device.deviceId } : undefined;
            if (device) {
                const label = device.label.toLowerCase();
                useFrontCamera = label.includes('front') || label.includes('user') || label.includes('selfie');
            }

            let constraints = { video: { deviceId: deviceId, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            } catch (err) {
                constraints.video.width = { ideal: 640 };
                constraints.video.height = { ideal: 480 };
                try {
                    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch (fallbackErr) {
                    isCameraSwitching = false;
                    statusTextEl.innerText = "啟動失敗，請重試";
                    return;
                }
            }

            videoElement.srcObject = currentStream;
            
            await new Promise((resolve) => { videoElement.onloadeddata = () => resolve(); });
            
            await videoElement.play();
            
            statusTextEl.innerText = `已切換 (${useFrontCamera ? '前鏡頭 / 鏡像' : '後鏡頭 / 正常'})`;
            statusTextEl.style.color = "#2ecc71";
            startBtn.style.display = "none"; 
            zoomContainer.style.display = "block"; 
            
            isCameraSwitching = false; 

            if (!hasStartedLoop) {
                hasStartedLoop = true;
                requestAnimationFrame(processFrame);
            }
        }

        async function processFrame(timestamp) {
            if (timestamp - lastTime < 33) {
                requestAnimationFrame(processFrame);
                return;
            }
            lastTime = timestamp;

            if (!videoElement.paused && !videoElement.ended && !isProcessingFrame && !isCameraSwitching && videoElement.videoWidth > 0) {
                isProcessingFrame = true;
                try {
                    await pose.send({image: videoElement});
                } catch (e) {
                    console.error("AI 異常:", e);
                }
                isProcessingFrame = false; 
            }
            requestAnimationFrame(processFrame);
        }

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            await getCameras();
            await startCamera();
        });

        cameraSelect.addEventListener('change', async (e) => {
            if (isCameraSwitching) return;
            currentDeviceIndex = parseInt(e.target.value);
            await startCamera();
        });

        zoomSlider.addEventListener('input', (e) => {
            currentZoomLevel = parseFloat(e.target.value);
            cameraContainer.style.transform = `scale(${currentZoomLevel})`;
        });

    </script>
</body>
</html>
